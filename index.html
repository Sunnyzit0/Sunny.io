<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunny</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e8e8e8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: -1px;
    }

    .name {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .bio {
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 400;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }

    .link::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }

    .link:hover::after { transform: translateX(100%); }
    .link:hover {
      background: #1e1e1e;
      border-color: #3a3a3a;
      transform: translateY(-1px);
    }
    .link:active { transform: translateY(0); }

    .link:nth-child(1) { animation-delay: 0.1s; }
    .link:nth-child(2) { animation-delay: 0.2s; }
    .link:nth-child(3) { animation-delay: 0.3s; }
    .link:nth-child(4) { animation-delay: 0.4s; }

    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 16px; height: 16px; }

    .icon-github { background: #1e1e1e; border: 1px solid #333; }
    .icon-instagram { background: #1e1218; border: 1px solid #3a1f2e; }
    .icon-linkedin { background: #0f1823; border: 1px solid #1a3248; }
    .icon-discord { background: #12131e; border: 1px solid #252840; }

    .link-text { flex: 1; }
    .link-name { display: block; font-size: 14px; font-weight: 500; }
    .link-handle {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 1px;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 16px;
      transition: transform 0.2s, color 0.2s;
    }
    .link:hover .link-arrow { transform: translateX(3px); color: var(--text); }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 11px;
      color: #333;
      font-family: 'DM Mono', monospace;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

</body>
</html>
